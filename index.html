<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Finance Hub</title>
  <!-- Link your CSS file here later -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Main container for the core application content -->
  <main class="dashboard-container">
    
    <header class="dashboard-header">
      <h1>Personal Finance Hub</h1>
      <p>Manage your finances effectively and efficiently in real-time.</p>
    </header>

    <!-- SECTION 1: Financial Summary Cards -->
    <section class="summary-section" aria-label="Financial Summary">
      <article class="card balance-card">
        <h2>Net Balance</h2>
        <p id="total-balance">$0.00</p>
      </article>

      <article class="card income-card">
        <h2>Total Income</h2>
        <p id="total-income">$0.00</p>
      </article>

      <article class="card expense-card">
        <h2>Total Expenses</h2>
        <p id="total-expenses">$0.00</p>
      </article>
    </section>

    <!-- SECTION 2: Transaction Input Form -->
    <section class="form-section">
      <h2>Add New Transaction</h2>
      
      <form id="transaction-form">
        <div class="form-control">
          <label for="description">Description</label>
          <input type="text" id="description" placeholder="e.g., Groceries, Salary" required />
        </div>

        <div class="form-control">
          <label for="amount">Amount ($)</label>
          <input type="number" id="amount" step="0.01" min="0.01" placeholder="0.00" required />
        </div>

        <div class="form-control">
          <label for="type">Transaction Type</label>
          <select id="type" required>
            <option value="" disabled selected>Select type...</option>
            <option value="income">Income (+)</option>
            <option value="expense">Expense (-)</option>
          </select>
        </div>

        <button type="submit" class="btn-submit">Add Transaction</button>
      </form>
    </section>

    <!-- SECTION 3: The Transaction Ledger History -->
    <section class="history-section">
      <h2>Transaction History</h2>
      
      <!-- JavaScript will dynamically inject <li> items inside this <ul> -->
      <ul id="transaction-list" class="ledger-list">
        <!-- Temporary mock item for CSS styling purposes (delete later) -->
        <li class="ledger-item expense">
          <span>Target Shopping</span>
          <span>-$45.20</span>
        </li>
      </ul>
    </section>

  </main>

  <!-- Link your JavaScript file here later -->
  <script src="script.js"></script>
</body>
</html>
